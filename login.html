<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFX LED — Access</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body {
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      text-align: center;
    }

    .login-logo {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    .login-logo span {
      background: linear-gradient(90deg, var(--lime-1), var(--lime-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-title {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      -webkit-text-security: disc;
      text-security: disc;
    }

    .input-wrap input:focus {
      border-color: rgba(198,255,0,0.4);
      background: rgba(198,255,0,0.04);
    }

    .input-wrap input.error {
      border-color: rgba(255,80,80,0.6);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .error-msg {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,100,100,0.8);
      height: 1em;
      transition: opacity 0.2s;
    }

    .error-msg:empty { opacity: 0; }

    .submit-btn {
      width: 100%;
      background: linear-gradient(110deg, var(--lime-1), var(--lime-2), var(--lime-3));
      background-size: 200% 100%;
      color: #000;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      padding: 0.9rem;
      border: none;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background-position 0.3s, transform 0.2s, box-shadow 0.3s;
    }

    .submit-btn:hover {
      background-position: 100% center;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(198,255,0,0.3);
    }

    .back-link {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--text-muted); }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(198,255,0,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseGlow 4s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="page-bg"></div>
  <div class="glow"></div>

  <div class="login-wrap anim-fadeup">
    <div class="login-logo"><span>SFX</span> LED</div>

    <div>
      <p class="label label--lime" style="margin-bottom:0.75rem">Preview Access</p>
      <h1 class="login-title">Enter&nbsp;Password</h1>
    </div>

    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="input-wrap">
        <input
          type="password"
          id="pwInput"
          placeholder="••••••••••••"
          autocomplete="current-password"
          spellcheck="false"
        />
      </div>
      <p class="error-msg" id="errMsg"></p>
      <button type="submit" class="submit-btn">Enter</button>
    </form>

    <a class="back-link" href="index.html">← Back to coming soon</a>
  </div>

  <script>
    const CORRECT = 'SFXLED2026';
    const DEST    = 'home.html';

    // Already authed?
    if (localStorage.getItem('sfx_auth') === '1') {
      window.location.replace(DEST);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('pwInput');
      const err   = document.getElementById('errMsg');
      if (input.value === CORRECT) {
        localStorage.setItem('sfx_auth', '1');
        window.location.replace(DEST);
      } else {
        err.textContent = 'Incorrect password';
        input.classList.add('error');
        setTimeout(() => input.classList.remove('error'), 400);
      }
    });
  </script>

</body>
</html>
