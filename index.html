<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SFX LED — Coming Soon</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --lime-1: #c6ff00;
      --lime-2: #76ff03;
      --lime-3: #00e676;
      --lime-4: #69ff47;
      --lime-5: #b2ff59;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      /* subtle slow drift */
      animation: bgDrift 30s ease-in-out infinite alternate;
    }

    @keyframes bgDrift {
      from { transform: scale(1.04) translate(0, 0); }
      to   { transform: scale(1.08) translate(-1%, 1%); }
    }

    /* multi-stop dark gradient overlay */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 100%, rgba(0,0,0,0.15) 0%, transparent 60%),
        linear-gradient(
          to top,
          rgba(0,0,0,0.97) 0%,
          rgba(0,0,0,0.80) 25%,
          rgba(0,0,0,0.45) 55%,
          rgba(0,0,0,0.20) 75%,
          rgba(0,0,0,0.08) 100%
        );
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.2rem, 3vw, 2rem);
      padding: 2rem;
      max-width: 900px;
      width: 100%;
    }

    /* ── Wordmark ── */
    .wordmark {
      font-size: clamp(0.75rem, 1.8vw, 1.1rem);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      font-weight: 300;
      animation: fadeUp 1.2s ease 0.2s both;
    }

    /* ── Hero headline ── */
    .headline {
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-transform: uppercase;

      background: linear-gradient(
        110deg,
        var(--lime-1) 0%,
        var(--lime-2) 18%,
        #fff        35%,
        var(--lime-3) 52%,
        var(--lime-4) 68%,
        #fff        80%,
        var(--lime-5) 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

      animation:
        fadeUp  1.2s ease 0.4s both,
        shimmer 4s   linear 1.6s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ── Sub-headline ── */
    .sub {
      font-size: clamp(0.9rem, 2.2vw, 1.35rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      animation: fadeUp 1.2s ease 0.65s both;
    }

    /* ── Divider ── */
    .divider {
      width: clamp(60px, 12vw, 120px);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--lime-2), var(--lime-1), transparent);
      border: none;
      animation: fadeUp 1.2s ease 0.8s both, pulse 3s ease-in-out 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Body copy ── */
    .body-text {
      font-size: clamp(0.85rem, 1.6vw, 1.05rem);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      line-height: 1.7;
      max-width: 480px;
      animation: fadeUp 1.2s ease 1s both;
    }

    /* ── Contact ── */
    .contact-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      animation: fadeUp 1.2s ease 1.2s both;
    }

    .contact-label {
      font-size: clamp(0.65rem, 1.2vw, 0.78rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .contact-link {
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      letter-spacing: 0.12em;
      font-weight: 600;
      text-decoration: none;
      color: transparent;
      background: linear-gradient(
        90deg,
        var(--lime-1),
        var(--lime-3),
        var(--lime-2)
      );
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: background-position 0.4s ease, letter-spacing 0.3s ease;
    }

    .contact-link:hover {
      background-position: 100% center;
      letter-spacing: 0.18em;
    }

    /* ── Glow dot accent ── */
    .glow-ring {
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(198,255,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: roam 18s ease-in-out infinite alternate;
      z-index: 1;
      top: 10%;
      left: 5%;
    }

    @keyframes roam {
      0%   { transform: translate(0, 0)   scale(1); }
      33%  { transform: translate(60vw, 30vh) scale(1.3); }
      66%  { transform: translate(20vw, 60vh) scale(0.8); }
      100% { transform: translate(75vw, 10vh) scale(1.1); }
    }

    /* ── Enter Site button ── */
    .enter-btn {
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.6rem 1.4rem;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
      transition: color 0.25s, border-color 0.25s, background 0.25s;
      animation: fadeUp 1.2s ease 1.4s both;
    }
    .enter-btn:hover {
      color: var(--lime-1);
      border-color: rgba(198,255,0,0.35);
      background: rgba(198,255,0,0.04);
    }

    /* ── Scan lines (subtle) ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 5;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
    }

    /* ── Shared keyframe ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 500px) {
      .headline { line-height: 1; }
      .glow-ring { width: 200px; height: 200px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow-ring"></div>

  <main class="content">
    <p class="wordmark">SFX LED &nbsp;·&nbsp; Wireless LED Lighting</p>

    <h1 class="headline">New&nbsp;Site<br>Coming&nbsp;Soon</h1>

    <p class="sub">The future of wireless lighting is loading</p>

    <hr class="divider" />

    <p class="body-text">
      We're building something bright. Our new site is on its way —
      until then, reach out and let's light up your next event.
    </p>

    <div class="contact-wrap">
      <span class="contact-label">Get in touch</span>
      <a class="contact-link" href="mailto:team@sfxled.com">team@sfxled.com</a>
    </div>

    <a class="enter-btn" href="login.html">Enter Site →</a>
  </main>

</body>
</html>
